<section class="skills">
  <div class="container">
    <div class="section-title">
      <h2>My Skills</h2>
    </div>
    <div class="skills-categories">
      <div class="skill-category" *ngFor="let category of skillCategories">
        <h3>{{category.title}}</h3>
        <ul class="skill-list">
          <li *ngFor="let skill of category.skills">{{skill}}</li>
        </ul>
      </div>
    </div>
  </div>
</section>
