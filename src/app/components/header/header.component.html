<header [ngClass]="{'scrolled': scrolled}">
  <div class="container">
    <nav>
      <div class="logo" (click)="scrollToSection('home')">
        <svg class="logo-icon" viewBox="0 0 36 36" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="sha-grad" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#2f81f7"/>
              <stop offset="100%" stop-color="#a371f7"/>
            </linearGradient>
          </defs>
          <polygon points="18,2 32,10 32,26 18,34 4,26 4,10" stroke="url(#sha-grad)" stroke-width="1.5" fill="none"/>
          <text x="18" y="24.5" text-anchor="middle" fill="url(#sha-grad)" font-size="18" font-weight="700" font-family="-apple-system,system-ui,sans-serif">S</text>
        </svg>
        <span class="logo-text"><span class="logo-bracket">&lt;</span><span class="logo-name">SHA</span><span class="logo-bracket">&nbsp;/&gt;</span></span>
      </div>
      <ul class="nav-links" id="primary-navigation" [ngClass]="{'active': menuOpen}">
        <li><a href="/" (click)="onNavLinkClick($event, 'home')" [class.active]="currentSection === 'home'">Home</a></li>
        <li><a href="/about" (click)="onNavLinkClick($event, 'about')" [class.active]="currentSection === 'about'">About</a></li>
        <li><a href="/skills" (click)="onNavLinkClick($event, 'skills')" [class.active]="currentSection === 'skills'">Skills</a></li>
        <li><a href="/experience" (click)="onNavLinkClick($event, 'experience')" [class.active]="currentSection === 'experience'">Experience</a></li>
        <li><a href="/projects" (click)="onNavLinkClick($event, 'projects')" [class.active]="currentSection === 'projects'">Projects</a></li>
        <li><a href="/contact" (click)="onNavLinkClick($event, 'contact')" [class.active]="currentSection === 'contact'">Contact</a></li>
      </ul>
      <button class="menu-toggle" [ngClass]="{'active': menuOpen}" (click)="toggleMenu()" type="button" aria-label="Toggle navigation menu" [attr.aria-expanded]="menuOpen" aria-controls="primary-navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </div>
</header>
