<section class="hero">
    <div class="particles-container" id="particles-js"></div>
    
    <div class="container">
        <div class="hero-content" [@fadeInUp]>
            <div class="profile-container">
                <div class="profile-avatar">
                    <img src="assets/files/shakoor_pic.jpeg" alt="Shakoor Hussain Attari" width="335" height="335" loading="eager" fetchpriority="high" decoding="async">
                    <div class="avatar-border"></div>
                </div>
                <div class="social-icons">
                    <a href="https://www.linkedin.com/in/shakoorattari/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn Profile">
                        <i class="fab fa-linkedin"></i>
                    </a>
                    <a href="https://github.com/shakoorattari" target="_blank" rel="noopener noreferrer" aria-label="GitHub Profile">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="mailto:binmushtaq@gmail.com" aria-label="Email Me">
                        <i class="fas fa-envelope"></i>
                    </a>
                </div>
            </div>
            
            <h1 class="animate-text">Shakoor Hussain Attari</h1>
            
            <div class="role-container">
                <h2>
                    <span class="static-text">I'm a</span>
                    <span class="dynamic-text" data-rotate='["Lead Software Engineer", "Full-Stack Developer", "Application Architect", ".NET / Angular Specialist", "IAM &amp; AI Tooling Engineer"]'></span>
                </h2>
            </div>
            
            <p>Lead Software Engineer, Full-Stack Developer &amp; Application Architect with 15+ years owning enterprise platforms across the UAE public sector — .NET, Angular, OAuth 2.0 / OIDC, multi-tenant IAM, and AI tooling.</p>
            
            <div class="professional-badge">
                <a href="https://www.linkedin.com/in/shakoorattari/" target="_blank" rel="noopener noreferrer" aria-label="View LinkedIn verified profile">
                    <i class="fab fa-linkedin"></i> LinkedIn Verified Professional
                </a>
            </div>
            
            <div class="hero-buttons">
                <button (click)="scrollToContact()" class="btn primary-btn">
                    <span class="btn-text">Hire Me</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <a href="assets/files/ShakoorHussain_Resume_V2.pdf" class="btn secondary-btn" download>
                    <span class="btn-text">Download CV</span>
                    <i class="fas fa-download"></i>
                </a>
                <button (click)="scrollToProjects()" class="btn secondary-btn" type="button">
                    <span class="btn-text">View Case Studies</span>
                    <i class="fas fa-diagram-project"></i>
                </button>
            </div>
        </div>
        
        <!-- Moved the scroll indicator outside of hero-content -->
        <button class="scroll-indicator" (click)="scrollToAbout()" type="button" aria-label="Scroll to About section">
            <span>Scroll Down</span>
            <i class="fas fa-chevron-down"></i>
        </button>
    </div>
</section>
