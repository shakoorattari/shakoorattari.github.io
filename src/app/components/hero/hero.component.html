<section class="hero">
    <div class="particles-container" id="particles-js"></div>
    
    <div class="container">
        <div class="hero-content" [@fadeInUp]>
            <div class="profile-container">
                <div class="profile-avatar">
                    <img src="assets/files/shakoor_pic.jpeg" alt="Shakoor Hussain Attari">
                    <div class="avatar-border"></div>
                </div>
                <div class="social-icons">
                    <a href="https://www.linkedin.com/in/shakoorattari/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn Profile">
                        <i class="fab fa-linkedin"></i>
                    </a>
                    <a href="https://github.com/shakoorattari" target="_blank" rel="noopener noreferrer" aria-label="GitHub Profile">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="mailto:binmushtaq@gmail.com" aria-label="Email Me">
                        <i class="fas fa-envelope"></i>
                    </a>
                </div>
            </div>
            
            <h1 class="animate-text">Shakoor Hussain Attari</h1>
            
            <div class="role-container">
                <h2>
                    <span class="static-text">I'm a</span>
                    <span class="dynamic-text" data-rotate='["Senior Full Stack Developer", "Angular Specialist", ".NET Developer", "Database Expert"]'></span>
                </h2>
            </div>
            
            <p>Building robust digital solutions with 15+ years of experience in web development and automation.</p>
            
            <div class="professional-badge">
                <a href="https://www.linkedin.com/in/shakoorattari/" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-linkedin"></i> LinkedIn Verified Professional
                </a>
            </div>
            
            <div class="hero-buttons">
                <button (click)="scrollToContact()" class="btn primary-btn">
                    <span class="btn-text">Hire Me</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <a href="assets/files/Shakoor_Hussain_Resume.pdf" class="btn secondary-btn" download>
                    <span class="btn-text">Download CV</span>
                    <i class="fas fa-download"></i>
                </a>
            </div>
        </div>
        
        <!-- Moved the scroll indicator outside of hero-content -->
        <div class="scroll-indicator" (click)="scrollToAbout()">
            <span>Scroll Down</span>
            <i class="fas fa-chevron-down"></i>
        </div>
    </div>
</section>
