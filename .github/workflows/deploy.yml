name: Build and Deploy Angular App to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" .
          git checkout ${{ github.sha }}

      - name: Show environment
        run: |
          echo "Node: $(node --version)"
          echo "npm:  $(npm --version)"

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        run: npm run build -- --base-href=/portfolio/

      - name: Add SPA fallback and disable Jekyll
        run: |
          cp dist/shakoor-portfolio/index.html dist/shakoor-portfolio/404.html
          touch dist/shakoor-portfolio/.nojekyll

      - name: Deploy to GitHub Pages
        run: |
          cd dist/shakoor-portfolio
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout --orphan gh-pages
          git add -A
          git commit -m "Deploy ${{ github.sha }}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages
